# Free deployment blueprint for Render (https://render.com).
#
# This defines two free services:
#   - nexus-api : the Node/Socket.IO backend (Docker), runs DB migrations on boot
#   - nexus-web : the static React frontend (global CDN, free SSL)
#
# The database is NOT defined here — use a free Neon Postgres (neon.tech) and
# paste its connection string into DATABASE_URL. See docs/FREE_HOSTING.md.
#
# After the first deploy, set the cross-URLs (they're left manual because the
# public URLs only exist once the services are created):
#   nexus-web : VITE_API_URL + VITE_SOCKET_URL = the nexus-api URL
#   nexus-api : CLIENT_ORIGIN = the nexus-web URL
# then trigger a redeploy of both.

services:
  - type: web
    name: nexus-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false # paste your Neon connection string (include ?sslmode=require)
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret for you
      - key: CLIENT_ORIGIN
        sync: false # set to the nexus-web URL after first deploy
      - key: STUN_URLS
        value: stun:stun.l.google.com:19302,stun:stun1.l.google.com:19302
      # Optional: set to a Redis URL (e.g. Upstash / Render Key Value) to enable
      # the Socket.IO Redis adapter for multi-instance horizontal scaling. Leave
      # unset for a single instance.
      - key: REDIS_URL
        sync: false
      # ---- Durable media (Cloudflare R2). Without these, uploads fall back to
      # the ephemeral local disk and are wiped on every redeploy. ----
      - key: MEDIA_STORAGE_PROVIDER
        value: local # change to "cloud" once the R2 vars below are filled in
      - key: MEDIA_PUBLIC_BASE_URL
        sync: false # R2 bucket public URL (public dev URL or custom domain)
      - key: R2_ENDPOINT
        sync: false # https://<account-id>.r2.cloudflarestorage.com
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      # ---- Web Push (closed-app notifications). Generate a key pair with
      # `npx web-push generate-vapid-keys`. Without these, push is disabled. ----
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:admin@nexus.local
      - key: SMTP_HOST
        sync: false # optional: smtp.gmail.com for real verification emails
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

  - type: web
    name: nexus-web
    runtime: static
    # Render already installs workspace deps with pnpm before this runs, so we
    # only need to build. (Don't call `corepack enable` — Render's /usr/bin is
    # read-only and it errors.)
    buildCommand: pnpm --filter @nexus/web build
    staticPublishPath: ./apps/web/dist
    envVars:
      - key: NODE_VERSION
        value: "22.11.0"
      - key: VITE_API_URL
        sync: false # set to the nexus-api URL after first deploy
      - key: VITE_SOCKET_URL
        sync: false # same as VITE_API_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
